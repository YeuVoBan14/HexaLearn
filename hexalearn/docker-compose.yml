services:
  hexalearn:
    build: .
    container_name: hexalearn_container
    user: root
    depends_on:
      - redis
    restart: always
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env
    command: ["/app/entrypoint.prod.sh"]

  celery-worker:
    build: .
    container_name: celery-worker
    restart: always
    env_file:
      - .env
    command: celery -A hexalearn.celery_app worker --loglevel=info --pool=solo
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  frontend_proxy:
    image: nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro # Nginx đọc từ đây
    depends_on:
      - hexalearn

volumes:
  static_volume:
